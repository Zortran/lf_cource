---
- name: Clone git repository to roles directory
  hosts: localhost
  gather_facts: false
  tasks:
      - name: Ensure roles directory exists
        ansible.builtin.file:
            path: "roles"
            state: directory
            mode: "0755"

      - name: Clone the git repository into the roles directory
        ansible.builtin.git:
            repo: "git@github.com:Zortran/lf_cource_roles.git"
            dest: "roles"
            version: master
            force: true
